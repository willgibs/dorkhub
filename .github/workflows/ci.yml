name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: pnpm build

      # Uncomment when vitest lands (first tests: trending score, cursor codecs,
      # sanitizer — see docs/plan-master.md M4):
      # - run: pnpm exec vitest run --passWithNoTests
